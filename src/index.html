<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OpenBaseAfrica</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/assets/Main Logo.png">
  <style>
    /* ── Bootstrap Loading Screen ── */
    .app-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1A3C5E;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .app-loader.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    /* Logo mark */
    .app-loader__logo {
      width: 64px;
      height: 64px;
      margin-bottom: 32px;
      animation: loader-pulse 2.5s ease-in-out infinite;
    }
    .app-loader__logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Brand name */
    .app-loader__text {
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
    }
    .app-loader__text span {
      color: #C49A1A;
    }

    /* Progress bar track */
    .app-loader__bar-track {
      width: 180px;
      height: 3px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      overflow: hidden;
    }

    /* Progress bar fill – animated sweep */
    .app-loader__bar-fill {
      width: 40%;
      height: 100%;
      background: #C49A1A;
      border-radius: 3px;
      animation: loader-sweep 2.5s ease-in-out infinite;
    }

    @keyframes loader-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.6; transform: scale(0.95); }
    }

    @keyframes loader-sweep {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(150%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <!-- Loading screen shown until Angular bootstraps, then faded out -->
  <div class="app-loader" id="app-loader">
    <div class="app-loader__logo">
      <img src="/assets/Main Logo.png" alt="OpenBaseAfrica">
    </div>
    <div class="app-loader__text">Open<span>Base</span>Africa</div>
    <div class="app-loader__bar-track">
      <div class="app-loader__bar-fill"></div>
    </div>
  </div>
  <app-root></app-root>
</body>
</html>
