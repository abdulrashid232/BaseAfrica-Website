<section class="w-full min-h-[600px] relative overflow-hidden py-16 md:py-24 flex items-center">
  <!-- Background Image Layer -->
  <div class="absolute inset-0 z-0">
    <img src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&q=80&w=2000" alt="Bright Office Background" class="w-full h-full object-cover opacity-50 mix-blend-overlay" />
  </div>

  <!-- Solid Color & Gradient Overlay to match brand-primary vibe -->
  <div class="absolute inset-0 bg-brand-primary/60 z-0"></div>
  <div class="absolute inset-0 bg-gradient-to-r from-brand-primary/95 via-brand-primary/85 to-brand-primary/70 z-0"></div>

  <div class="container mx-auto px-6 md:px-12 relative z-10 flex flex-col lg:flex-row items-center gap-12 lg:gap-16 max-w-7xl">
    
    <!-- Left Column: Content -->
    <div class="w-full lg:w-1/2 flex flex-col space-y-8 text-center lg:text-left">
      <h1 class="text-4xl md:text-5xl xl:text-6xl font-extrabold text-white leading-tight tracking-tight">
        Scale Your<br class="hidden lg:block" /> Operations in<br class="hidden lg:block" /> Africa
      </h1>
      
      <p class="text-base md:text-lg text-[#9BA8B5] leading-relaxed max-w-2xl mx-auto lg:mx-0">
        Bridge the gap with offshore operations designed for stability and global corporate standards. Achieve operational excellence with lower costs and highly scalable teams.
      </p>

      <div class="flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-4 pt-2">
        <button class="w-full sm:w-auto bg-brand-secondary hover:bg-brand-secondary/90 text-brand-primary font-bold text-lg px-8 py-3.5 rounded shadow-lg transition-all duration-300">
          Book a Consultation
        </button>
        <button class="w-full sm:w-auto bg-transparent hover:bg-white/5 text-white font-semibold text-lg px-8 py-3.5 rounded border border-white/80 transition-all duration-300">
          View Projects
        </button>
      </div>
    </div>

    <!-- Right Column: Image -->
    <div class="w-full lg:w-1/2 flex justify-center lg:justify-end">
      <!-- Image Frame matching the design -->
      <div class="p-4 md:p-6 bg-[#162D45] shadow-2xl rounded-sm w-full max-w-md lg:max-w-lg aspect-square relative border border-white/5">
        <div class="w-full h-full relative overflow-hidden group">
          <!-- Placeholder image replicating the glowing city office vibe -->
          <img 
            src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=1000" 
            alt="Modern Office Workspace" 
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
          />
          <!-- Overlay to tint image blueish -->
          <div class="absolute inset-0 bg-[#0A1929]/30 mix-blend-multiply transition-opacity duration-300 group-hover:opacity-0"></div>
          <!-- Subtle inner border effect -->
          <div class="absolute inset-0 border border-white/10 pointer-events-none"></div>
        </div>
      </div>
    </div>

  </div>
</section>
