@if (isOpen()) {
  <div class="bm-backdrop" (click)="close()">
    <div class="bm-card" (click)="$event.stopPropagation()">

      <!-- Close Button -->
      <button class="bm-close" (click)="close()" aria-label="Close modal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="bm-close-icon">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <!-- Left: Info Panel -->
      <div class="bm-left bg-navy-pattern">

        <span class="kicker">Schedule a Call</span>

        <!-- Brand -->
        <div class="bm-brand">
          <div class="bm-brand-circle"></div>
          <div>
            <p class="bm-brand-name">OPEN BASE</p>
            <p class="bm-brand-sub">— AFRICA —</p>
          </div>
        </div>

        <!-- Event Block -->
        <div class="bm-event">
          <div class="bm-event-bar"></div>
          <div>
            <h2 class="bm-event-title">30-Minute Consultation</h2>
            <p class="bm-event-desc">Discuss partnerships, projects, or general enquiries.</p>
          </div>
        </div>

        <!-- Detail List -->
        <ul class="bm-details">
          <li>
            <span class="bm-detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="9"/>
                <path d="M12 7v5l3 3"/>
              </svg>
            </span>
            30 minutes
          </li>
          <li>
            <span class="bm-detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="6" width="14" height="12" rx="2"/>
                <path d="M16 10l6-3v10l-6-3"/>
              </svg>
            </span>
            Google Meet
          </li>
          <li>
            <span class="bm-detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2 3 6v6c0 5 4 8.5 9 10 5-1.5 9-5 9-10V6l-9-4z"/>
              </svg>
            </span>
            Free of charge
          </li>
          <li>
            <span class="bm-detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="17" rx="2"/>
                <path d="M3 9h18M8 2v4M16 2v4"/>
              </svg>
            </span>
            Monday &ndash; Friday
          </li>
        </ul>

        <!-- Footer Note -->
        <div class="bm-left-footer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="bm-left-footer-icon">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Questions? <a href="mailto:info@openbase.africa" class="bm-left-footer-link">info&#64;openbase.africa</a></span>
        </div>

      </div>

      <!-- Right: Cal.com Embed -->
      <div class="bm-right">
        <iframe
          src="https://cal.com/open-base-africa-drf6ln/30min?embed=true"
          class="bm-iframe"
          frameborder="0"
          title="Schedule a 30-minute consultation with Open Base Africa">
        </iframe>
      </div>

    </div>
  </div>
}
