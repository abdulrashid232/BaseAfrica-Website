<!-- Services Section -->
<section class="w-full py-24 bg-gray-100">
  <div class="container mx-auto px-6 md:px-12 max-w-7xl">
    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-4xl font-extrabold text-brand-primary tracking-tight">Core Operational Services</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-8">
      @for (service of services; track service.title) {
        <div class="bg-white p-10 rounded shadow-sm border border-gray-100 hover:shadow-md transition-shadow duration-300">
          <lucide-angular [img]="service.icon" class="w-7 h-7 text-brand-primary mb-6"></lucide-angular>
          <h3 class="text-xl font-bold text-brand-primary mb-4">{{ service.title }}</h3>
          <p class="text-gray-500 text-[15px] leading-relaxed">{{ service.description }}</p>
        </div>
      }
    </div>
  </div>
</section>

<!-- CTA Section -->
<section class="w-full py-28 bg-brand-primary text-center">
  <div class="container mx-auto px-6 max-w-4xl">
    <h2 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-white tracking-tight mb-8">Build Your African<br class="hidden md:block"/> Operation</h2>
    <p class="text-blue-100 text-lg md:text-xl mb-12 leading-relaxed max-w-2xl mx-auto font-medium">
      Ready to take your business to the next level? Connect with our experts today and start your expansion journey.
    </p>
    <button class="bg-brand-secondary hover:bg-brand-secondary/90 text-brand-primary font-bold text-lg px-10 py-4 rounded shadow-lg transition-all duration-300 hover:scale-105">
      Book a Consultation
    </button>
  </div>
</section>
