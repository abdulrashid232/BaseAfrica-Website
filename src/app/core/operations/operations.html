<!-- Services Section -->
<section class="w-full py-pad bg-mist">
  <div class="w-full max-w-[1180px] mx-auto px-6">
    <div class="text-center mb-16 reveal-on-scroll">
      <h2 class="text-navy">Core Operational Services</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      @for (service of services; track service.title) {
        <div class="bg-white p-10 card-hover reveal-on-scroll">
          <lucide-angular [img]="service.icon" class="w-7 h-7 text-navy mb-6"></lucide-angular>
          <h3 class="text-navy mb-4">{{ service.title }}</h3>
          <p class="text-ink leading-relaxed">{{ service.description }}</p>
        </div>
      }
    </div>
  </div>
</section>

<!-- CTA Section -->
<section class="w-full py-pad bg-navy text-center">
  <div class="w-full max-w-[1180px] mx-auto px-6">
    <h2 class="text-white mb-8">Build Your African<br class="hidden md:block"/> Operation</h2>
    <p class="text-ink-light text-lead mb-12 max-w-2xl mx-auto">
      Ready to take your business to the next level? Connect with our experts today and start your expansion journey.
    </p>
    <button routerLink="/contact" class="btn-primary px-10 py-4 text-lg">
      Book a Consultation
    </button>
  </div>
</section>
