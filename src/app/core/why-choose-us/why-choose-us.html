<section class="w-full py-24 bg-[#FAFAFA]">
  <div class="container mx-auto px-6 md:px-12 max-w-7xl">
    
    <!-- Section Header -->
    <div class="text-center max-w-3xl mx-auto mb-16">
      <h3 class="text-xs font-bold text-brand-secondary tracking-[0.2em] uppercase mb-4">Why Choose Us</h3>
      <h2 class="text-3xl md:text-4xl font-extrabold text-brand-primary tracking-tight">Strategic Advantage for Offshore Operations</h2>
    </div>

    <!-- Features Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 xl:gap-8">
      @for (feature of features; track feature.title) {
        <div class="bg-white p-8 border border-gray-200 hover:border-gray-300 transition-colors duration-300 shadow-sm flex flex-col h-full">
          
          <!-- Icon Box -->
          <div class="w-12 h-12 bg-brand-tertiary/10 rounded flex items-center justify-center mb-8">
            <lucide-angular [img]="feature.icon" class="w-6 h-6 text-brand-tertiary"></lucide-angular>
          </div>

          <!-- Card Content -->
          <h4 class="text-xl font-bold text-gray-900 mb-4">{{ feature.title }}</h4>
          <p class="text-[15px] text-gray-500 leading-relaxed">{{ feature.description }}</p>
          
        </div>
      }
    </div>
    
  </div>
</section>
